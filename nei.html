<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiência — Game.DB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>

    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        background: #201c1c;
        color: #e8e0d8;
        font-family: 'Rajdhani', sans-serif;
        min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        padding: 22px 24px;
        border-bottom: 1px solid #2e2828;
        flex-wrap: wrap;
    }

    .nav-brand {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        color: #5a5050;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-right: auto;
    }

    .glow-btn {
        position: relative;
        z-index: 0;
        padding: 0 22px;
        height: 38px;
        background: #111;
        color: #e8e0d8;
        border: none;
        border-radius: 8px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        transition: color .2s;
    }

    .glow-btn.active {
        color: #fff;
    }

    .glow-btn::before {
        content: '';
        background: linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8,#ff0000);
        position: absolute;
        top: -2px; left: -2px;
        background-size: 400%;
        z-index: -1;
        filter: blur(5px);
        width: calc(100% + 4px);
        height: calc(100% + 4px);
        animation: glowing 20s linear infinite;
        opacity: 0;
        transition: opacity .3s ease-in-out;
        border-radius: 8px;
    }

    .glow-btn::after {
        content: '';
        z-index: -1;
        position: absolute;
        width: 100%; height: 100%;
        background: #111;
        left: 0; top: 0;
        border-radius: 8px;
    }

    .glow-btn:hover::before,
    .glow-btn.active::before { opacity: 1; }

    .glow-btn:active { color: #000; }
    .glow-btn:active::after { background: transparent; }

    @keyframes glowing {
        0%   { background-position: 0 0; }
        50%  { background-position: 400% 0; }
        100% { background-position: 0 0; }
    }

    /* ── PAGE ── */
    .page-header {
        text-align: center;
        padding: 40px 24px 12px;
    }

    .page-header h1 {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #fff;
        line-height: 1;
    }

    .page-header .sub {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        color: #5a5050;
        letter-spacing: 3px;
        margin-top: 6px;
    }

    /* ── CHART CARD ── */
    .chart-wrap {
        max-width: 680px;
        margin: 32px auto;
        padding: 0 20px 60px;
    }

    .card {
        background: #1a1616;
        border: 1px solid #2e2828;
        border-radius: 16px;
        padding: 32px 24px 24px;
        position: relative;
        overflow: hidden;
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, #4a3f3f, transparent);
    }

    .chart-canvas-wrap {
        position: relative;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
    }

    .chart-center-label {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: none;
    }

    .chart-center-label .total {
        font-family: 'Share Tech Mono', monospace;
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        line-height: 1;
    }

    .chart-center-label .total-label {
        font-size: 11px;
        color: #5a5050;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
    }

    /* ── LEGEND ── */
    .legend {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: #201c1c;
        border: 1px solid #2e2828;
        border-radius: 8px;
        cursor: pointer;
        transition: border-color .2s, opacity .2s;
        user-select: none;
    }

    .legend-item:hover { border-color: #4a3f3f; }

    .legend-item.hidden {
        opacity: 0.35;
    }

    .legend-swatch {
        width: 12px; height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
    }

    .legend-name {
        flex: 1;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #e8e0d8;
    }

    .legend-pct {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        color: #8a7f7f;
    }

    .legend-count {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        color: #5a5050;
    }

    /* ── TIMESTAMP ── */
    .timestamp {
        text-align: center;
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        color: #3a3333;
        letter-spacing: 2px;
        margin-top: 20px;
    }

    /* ── INDEX GRID ── */
    .index-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        max-width: 500px;
        margin: 60px auto;
        padding: 0 24px;
    }

    .index-btn {
        position: relative;
        z-index: 0;
        width: 100%;
        aspect-ratio: 1;
        background: #111;
        color: #e8e0d8;
        border: none;
        border-radius: 16px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: color .2s;
    }

    .index-btn .icon { font-size: 32px; }

    .index-btn::before {
        content: '';
        background: linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8,#ff0000);
        position: absolute;
        top: -2px; left: -2px;
        background-size: 400%;
        z-index: -1;
        filter: blur(8px);
        width: calc(100% + 4px);
        height: calc(100% + 4px);
        animation: glowing 20s linear infinite;
        opacity: 0;
        transition: opacity .35s ease-in-out;
        border-radius: 16px;
    }

    .index-btn::after {
        content: '';
        z-index: -1;
        position: absolute;
        width: 100%; height: 100%;
        background: #111;
        left: 0; top: 0;
        border-radius: 16px;
    }

    .index-btn:hover::before { opacity: 1; }
    .index-btn:hover { color: #fff; }
    .index-btn:active { color: #000; }
    .index-btn:active::after { background: transparent; }

</style>
</head>
<body>

<nav><span class="nav-brand">// GAME.DB</span><a href="index.html" class="glow-btn">🏠 Home</a><a href="franquias.html" class="glow-btn">🎮 Franquias</a><a href="paises.html" class="glow-btn">🌍 Países</a><a href="consoles.html" class="glow-btn">🕹️ Consoles</a><a href="nei.html" class="glow-btn active">📊 Experiência</a></nav>

<div class="page-header">
  <h1>Experiência</h1>
  <p class="sub">nível de interesse (NEI)</p>
</div>

<div class="chart-wrap">
  <div class="card">
    <div class="chart-canvas-wrap">
      <canvas id="myChart"></canvas>
      <div class="chart-center-label">
        <div class="total" id="centerTotal">222</div>
        <div class="total-label">total</div>
      </div>
    </div>

    <div class="legend" id="legend"></div>
  </div>

  <p class="timestamp">ATUALIZADO EM 01/05/2026 às 20:04</p>
</div>

<script>
const LABELS  = ["Não definido", "Perfeito", "Dominado", "Filler", "Zerado"];
const COUNTS  = [206, 7, 4, 3, 2];
const COLORS  = ["#ff6b6b", "#ffa94d", "#ffd43b", "#69db7c", "#38d9a9"];
const TOTAL   = 222;

const hidden = new Set();

const ctx = document.getElementById('myChart').getContext('2d');

function buildDataset() {
  return COUNTS.map((c, i) => hidden.has(i) ? 0 : c);
}

const chart = new Chart(ctx, {
  type: 'doughnut',
  data: {
    labels: LABELS,
    datasets: [{
      data: buildDataset(),
      backgroundColor: COLORS,
      borderColor: '#201c1c',
      borderWidth: 3,
      hoverOffset: 8,
    }]
  },
  options: {
    responsive: true,
    cutout: '62%',
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => {
            const i = ctx.dataIndex;
            const pct = ((COUNTS[i] / TOTAL) * 100).toFixed(1);
            return ` ${COUNTS[i]} (${pct}%)`;
          }
        },
        backgroundColor: '#1a1616',
        titleColor: '#e8e0d8',
        bodyColor: '#8a7f7f',
        borderColor: '#2e2828',
        borderWidth: 1,
        padding: 12,
      }
    },
    animation: { duration: 500 },
  }
});

function renderLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  LABELS.forEach((label, i) => {
    const pct = ((COUNTS[i] / TOTAL) * 100).toFixed(1);
    const isHidden = hidden.has(i);
    const item = document.createElement('div');
    item.className = 'legend-item' + (isHidden ? ' hidden' : '');
    item.innerHTML = `
      <div class="legend-swatch" style="background:${COLORS[i]}"></div>
      <span class="legend-name">${label}</span>
      <span class="legend-pct">${pct}%</span>
      <span class="legend-count">${COUNTS[i]}</span>
    `;
    item.addEventListener('click', () => {
      if (hidden.has(i)) hidden.delete(i);
      else hidden.add(i);
      chart.data.datasets[0].data = buildDataset();
      chart.update();
      renderLegend();
    });
    leg.appendChild(item);
  });
}

renderLegend();
</script>
</body>
</html>

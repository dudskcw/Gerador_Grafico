<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game.DB</title>
<style>

    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        background: #201c1c;
        color: #e8e0d8;
        font-family: 'Rajdhani', sans-serif;
        min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        padding: 22px 24px;
        border-bottom: 1px solid #2e2828;
        flex-wrap: wrap;
    }

    .nav-brand {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        color: #5a5050;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-right: auto;
    }

    .glow-btn {
        position: relative;
        z-index: 0;
        padding: 0 22px;
        height: 38px;
        background: #111;
        color: #e8e0d8;
        border: none;
        border-radius: 8px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        transition: color .2s;
    }

    .glow-btn.active {
        color: #fff;
    }

    .glow-btn::before {
        content: '';
        background: linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8,#ff0000);
        position: absolute;
        top: -2px; left: -2px;
        background-size: 400%;
        z-index: -1;
        filter: blur(5px);
        width: calc(100% + 4px);
        height: calc(100% + 4px);
        animation: glowing 20s linear infinite;
        opacity: 0;
        transition: opacity .3s ease-in-out;
        border-radius: 8px;
    }

    .glow-btn::after {
        content: '';
        z-index: -1;
        position: absolute;
        width: 100%; height: 100%;
        background: #111;
        left: 0; top: 0;
        border-radius: 8px;
    }

    .glow-btn:hover::before,
    .glow-btn.active::before { opacity: 1; }

    .glow-btn:active { color: #000; }
    .glow-btn:active::after { background: transparent; }

    @keyframes glowing {
        0%   { background-position: 0 0; }
        50%  { background-position: 400% 0; }
        100% { background-position: 0 0; }
    }

    /* ── PAGE ── */
    .page-header {
        text-align: center;
        padding: 40px 24px 12px;
    }

    .page-header h1 {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #fff;
        line-height: 1;
    }

    .page-header .sub {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        color: #5a5050;
        letter-spacing: 3px;
        margin-top: 6px;
    }

    /* ── CHART CARD ── */
    .chart-wrap {
        max-width: 680px;
        margin: 32px auto;
        padding: 0 20px 60px;
    }

    .card {
        background: #1a1616;
        border: 1px solid #2e2828;
        border-radius: 16px;
        padding: 32px 24px 24px;
        position: relative;
        overflow: hidden;
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, #4a3f3f, transparent);
    }

    .chart-canvas-wrap {
        position: relative;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
    }

    .chart-center-label {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: none;
    }

    .chart-center-label .total {
        font-family: 'Share Tech Mono', monospace;
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        line-height: 1;
    }

    .chart-center-label .total-label {
        font-size: 11px;
        color: #5a5050;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
    }

    /* ── LEGEND ── */
    .legend {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: #201c1c;
        border: 1px solid #2e2828;
        border-radius: 8px;
        cursor: pointer;
        transition: border-color .2s, opacity .2s;
        user-select: none;
    }

    .legend-item:hover { border-color: #4a3f3f; }

    .legend-item.hidden {
        opacity: 0.35;
    }

    .legend-swatch {
        width: 12px; height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
    }

    .legend-name {
        flex: 1;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #e8e0d8;
    }

    .legend-pct {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        color: #8a7f7f;
    }

    .legend-count {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        color: #5a5050;
    }

    /* ── TIMESTAMP ── */
    .timestamp {
        text-align: center;
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        color: #3a3333;
        letter-spacing: 2px;
        margin-top: 20px;
    }

    /* ── INDEX GRID ── */
    .index-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        max-width: 500px;
        margin: 60px auto;
        padding: 0 24px;
    }

    .index-btn {
        position: relative;
        z-index: 0;
        width: 100%;
        aspect-ratio: 1;
        background: #111;
        color: #e8e0d8;
        border: none;
        border-radius: 16px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: color .2s;
    }

    .index-btn .icon { font-size: 32px; }

    .index-btn::before {
        content: '';
        background: linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8,#ff0000);
        position: absolute;
        top: -2px; left: -2px;
        background-size: 400%;
        z-index: -1;
        filter: blur(8px);
        width: calc(100% + 4px);
        height: calc(100% + 4px);
        animation: glowing 20s linear infinite;
        opacity: 0;
        transition: opacity .35s ease-in-out;
        border-radius: 16px;
    }

    .index-btn::after {
        content: '';
        z-index: -1;
        position: absolute;
        width: 100%; height: 100%;
        background: #111;
        left: 0; top: 0;
        border-radius: 16px;
    }

    .index-btn:hover::before { opacity: 1; }
    .index-btn:hover { color: #fff; }
    .index-btn:active { color: #000; }
    .index-btn:active::after { background: transparent; }


body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.index-title {
    font-family: 'Share Tech Mono', monospace;
    text-align: center;
    color: #3a3333;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 40px;
}

.index-title strong {
    display: block;
    font-family: 'Rajdhani', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 6px;
    margin-bottom: 4px;
}
</style>
</head>
<body>

<div class="index-title">
  <strong>GAME.DB</strong>
  // dashboard de acervo
</div>

<div class="index-grid">
  <a href="franquias.html" class="index-btn">
    <span class="icon">🎮</span>
    Franquias
  </a>
  <a href="paises.html" class="index-btn">
    <span class="icon">🌍</span>
    Países
  </a>
  <a href="consoles.html" class="index-btn">
    <span class="icon">🕹️</span>
    Consoles
  </a>
  <a href="nei.html" class="index-btn">
    <span class="icon">📊</span>
    Experiência
  </a>
</div>

</body>
</html>
